<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>JARVIS AI — Космический ИИ-ассистент</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space: { 950: '#02040a', 900: '#05081a', 800: '#0a0f2e', 700: '#101842' },
          },
          animation: {
            'twinkle': 'twinkle 3s ease-in-out infinite',
            'float': 'float 6s ease-in-out infinite',
            'pulse-glow': 'pulse-glow 3s ease-in-out infinite',
            'spin-slow': 'spin 20s linear infinite',
            'spin-reverse': 'spin-reverse 15s linear infinite',
            'voice-bar': 'voice-bar 1s ease-in-out infinite',
            'slide-up': 'slide-up 0.4s ease-out',
            'slide-in-right': 'slide-in-right 0.4s ease-out',
            'fade-in': 'fade-in 0.4s ease-out',
          },
          keyframes: {
            twinkle: {
              '0%, 100%': { opacity: '0.2', transform: 'scale(0.8)' },
              '50%': { opacity: '1', transform: 'scale(1.2)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-12px)' },
            },
            'pulse-glow': {
              '0%, 100%': { boxShadow: '0 0 20px rgba(99,102,241,0.4), 0 0 60px rgba(168,85,247,0.2)' },
              '50%': { boxShadow: '0 0 40px rgba(99,102,241,0.7), 0 0 80px rgba(168,85,247,0.4)' },
            },
            'spin-reverse': {
              '0%': { transform: 'rotate(0deg)' },
              '100%': { transform: 'rotate(-360deg)' },
            },
            'voice-bar': {
              '0%, 100%': { height: '20%' },
              '50%': { height: '90%' },
            },
            'slide-up': {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            'slide-in-right': {
              '0%': { opacity: '0', transform: 'translateX(40px)' },
              '100%': { opacity: '1', transform: 'translateX(0)' },
            },
            'fade-in': {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: #02040a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .aurora-bg {
      background:
        radial-gradient(ellipse at 20% 20%, rgba(99,102,241,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(6,182,212,0.08) 0%, transparent 60%),
        #02040a;
    }
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-strong {
      background: rgba(15,23,42,0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .gradient-text {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #22d3ee 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .custom-scrollbar::-webkit-scrollbar { width: 3px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 10px; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .voice-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(99,102,241,0.2);
      background: conic-gradient(from 0deg, transparent 0%, rgba(99,102,241,0.15) 25%, transparent 50%, rgba(168,85,247,0.15) 75%, transparent 100%);
    }
  </style>
</head>
<body class="aurora-bg">
  <div id="app" class="mx-auto flex h-full w-full max-w-md flex-col overflow-hidden shadow-2xl"></div>

  <script>
    // ═══════════════════════════════════════════════════════════
    // КОНФИГУРАЦИЯ OPENROUTER
    // ═══════════════════════════════════════════════════════════
    const OPENROUTER_API_KEY = "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"; // ← ВСТАВЬТЕ СЮДА КЛЮЧ
    const OPENROUTER_MODEL = "openrouter/free"; // ← МОДЕЛЬ
    const OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1";
    const isApiConfigured = () => OPENROUTER_API_KEY.trim().length > 0;

    // ───────────────────────────────────────────────────────────
    // SVG ИКОНКИ
    // ───────────────────────────────────────────────────────────
    const icons = {
      mic: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19v3"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><rect x="9" y="2" width="6" height="11" rx="3"/></svg>`,
      send: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>`,
      chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>`,
      sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`,
      zap: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
      messageSquare: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"/></svg>`,
      settings: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.47a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
      cpu: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20v2"/><path d="M12 2v2"/><path d="M17 20v2"/><path d="M17 2v2"/><path d="M2 12h2"/><path d="M2 17h2"/><path d="M2 7h2"/><path d="M20 12h2"/><path d="M20 17h2"/><path d="M20 7h2"/><path d="M7 20v2"/><path d="M7 2v2"/><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="8" y="8" width="8" height="8" rx="1"/></svg>`,
      globe: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg>`,
      image: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`,
      code: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,
      moreHorizontal: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`,
      command: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 6v12a3 3 0 1 0 3-3H6a3 3 0 1 0 3 3V6a3 3 0 1 0-3 3h12a3 3 0 1 0-3-3"/></svg>`,
      alertTriangle: `<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>`,
    };

    // ───────────────────────────────────────────────────────────
    // ЗВЁЗДНОЕ ПОЛЕ
    // ───────────────────────────────────────────────────────────
    function createStarField() {
      let html = '';
      for (let i = 0; i < 80; i++) {
        const x = Math.random() * 100;
        const y = Math.random() * 100;
        const size = Math.random() * 2 + 1;
        const duration = Math.random() * 4 + 2;
        const delay = Math.random() * 5;
        html += `<div class="absolute rounded-full bg-white animate-twinkle" style="left:${x}%;top:${y}%;width:${size}px;height:${size}px;opacity:0;animation-duration:${duration}s;animation-delay:${delay}s"></div>`;
      }
      return `<div class="pointer-events-none fixed inset-0 overflow-hidden z-0">${html}</div>`;
    }

    // ───────────────────────────────────────────────────────────
    // СОСТОЯНИЕ ПРИЛОЖЕНИЯ
    // ───────────────────────────────────────────────────────────
    const state = {
      screen: 'welcome',
      isListening: false,
      inputValue: '',
      isTyping: false,
      messages: [
        {
          id: '1',
          text: 'Здравствуйте. Я JARVIS, ваш персональный ИИ-ассистент. Готов помочь с анализом данных, генерацией кода, поиском информации и многим другим.',
          isUser: false,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        }
      ]
    };

    const suggestions = [
      'Расскажи о ближайших экзопланетах',
      'Сгенерируй код на React компонент',
      'Проанализируй этот текст',
      'Какая погода на Марсе?'
    ];

    const quickActions = [
      { icon: 'cpu', label: 'Анализ', color: 'from-violet-500 to-fuchsia-500' },
      { icon: 'code', label: 'Код', color: 'from-cyan-500 to-blue-500' },
      { icon: 'image', label: 'Генерация', color: 'from-amber-500 to-orange-500' },
      { icon: 'globe', label: 'Поиск', color: 'from-emerald-400 to-teal-500' },
    ];

    // ───────────────────────────────────────────────────────────
    // API OPENROUTER
    // ───────────────────────────────────────────────────────────
    async function sendToOpenRouter(userText) {
      const response = await fetch(`${OPENROUTER_BASE_URL}/chat/completions`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'HTTP-Referer': window.location.origin,
          'X-Title': 'JARVIS-AI Mobile App'
        },
        body: JSON.stringify({
          model: OPENROUTER_MODEL,
          messages: [{ role: 'user', content: userText }],
          temperature: 0.7,
          max_tokens: 1024
        })
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.error?.message || `Ошибка API: ${response.status}`);
      }

      const data = await response.json();
      const content = data.choices?.[0]?.message?.content;
      if (!content) throw new Error('Пустой ответ от модели');
      return content;
    }

    // ───────────────────────────────────────────────────────────
    // РЕНДЕРИНГ
    // ───────────────────────────────────────────────────────────
    function render() {
      const app = document.getElementById('app');
      if (state.screen === 'welcome') {
        app.innerHTML = renderWelcome();
      } else {
        app.innerHTML = renderMain();
      }
      bindEvents();
      if (state.screen === 'chat') scrollToBottom();
    }

    function renderWelcome() {
      return `
        <div class="relative flex h-full w-full items-center justify-center overflow-hidden animate-fade-in">
          ${createStarField()}
          <div class="relative z-10 flex flex-col items-center">
            <div class="relative flex h-64 w-64 items-center justify-center animate-float">
              <div class="voice-ring absolute h-full w-full animate-spin-slow"></div>
              <div class="voice-ring absolute h-[85%] w-[85%] animate-spin-reverse border-cyan-500/20"></div>
              <div class="absolute h-48 w-48 rounded-full bg-indigo-500/30 animate-ping" style="animation-duration:2s"></div>
              <div class="absolute h-48 w-48 rounded-full bg-purple-500/20 animate-ping" style="animation-duration:2.5s;animation-delay:0.5s"></div>
              <div class="relative flex h-36 w-36 items-center justify-center rounded-full bg-gradient-to-br from-indigo-600 via-purple-600 to-cyan-600 animate-pulse-glow">
                <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-white/20 to-transparent"></div>
                <div class="flex items-end gap-1 h-8">
                  ${[0,1,2,3,4].map(i => `<div class="w-1.5 rounded-full bg-white/90 animate-voice-bar" style="animation-delay:${i*0.1}s;height:30%"></div>`).join('')}
                </div>
              </div>
            </div>
            <h1 class="mt-10 text-center text-4xl font-light tracking-[0.2em] text-white animate-slide-up">
              <span class="gradient-text font-semibold" style="text-shadow:0 0 20px rgba(99,102,241,0.5)">JARVIS</span>
              <span class="ml-2 text-white/60">AI</span>
            </h1>
            <p class="mt-3 text-sm tracking-widest text-indigo-200/60 animate-slide-up" style="animation-delay:0.2s">
              ПЕРСОНАЛЬНЫЙ ИИ-АССИСТЕНТ
            </p>
          </div>
        </div>
      `;
    }

    function renderMain() {
      return `
        ${createStarField()}
        <header class="glass-strong relative z-20 flex items-center justify-between px-5 py-4 animate-slide-up">
          <div class="flex items-center gap-3">
            ${state.screen === 'chat' ? `
              <button id="btn-back" class="flex h-9 w-9 items-center justify-center rounded-full bg-white/5 text-white/80 active:scale-90 transition-transform">
                ${icons.chevronLeft}
              </button>
            ` : ''}
            <div class="relative">
              <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30">
                ${icons.sparkles}
              </div>
              <span class="absolute -right-0.5 -top-0.5 h-2.5 w-2.5 rounded-full bg-cyan-400 shadow-[0_0_8px_rgba(34,211,238,0.8)]"></span>
            </div>
            <div>
              <h2 class="text-base font-semibold text-white">JARVIS</h2>
              <p class="text-xs text-emerald-400">Онлайн • Готов к работе</p>
            </div>
          </div>
          <button class="flex h-10 w-10 items-center justify-center rounded-full bg-white/5 text-white/70 active:scale-90 transition-transform">
            ${icons.settings}
          </button>
        </header>

        <main class="relative z-10 flex flex-1 flex-col overflow-hidden">
          ${state.screen === 'home' ? renderHome() : renderChat()}
        </main>

        <div class="glass-strong relative z-20 p-4 animate-slide-up">
          <div class="flex items-center gap-3">
            <button id="btn-mic" class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full transition-all active:scale-90 ${state.isListening ? 'bg-gradient-to-br from-red-500 to-rose-600 shadow-lg shadow-red-500/40' : 'bg-gradient-to-br from-indigo-500 to-purple-600 shadow-lg shadow-indigo-500/30'}">
              ${state.isListening ? icons.zap : icons.mic}
            </button>
            <div class="relative flex-1">
              <input id="chat-input" type="text" value="${escapeHtml(state.inputValue)}" placeholder="Введите запрос..." class="h-11 w-full rounded-full border border-white/10 bg-white/5 px-4 pr-11 text-sm text-white placeholder-white/30 outline-none transition-all focus:border-indigo-500/50 focus:bg-white/10">
              <button id="btn-send" class="absolute right-1.5 top-1/2 flex h-8 w-8 -translate-y-1/2 items-center justify-center rounded-full bg-gradient-to-br from-cyan-500 to-blue-500 text-white disabled:opacity-30 ${!state.inputValue.trim() ? 'opacity-30' : ''}">
                ${icons.send}
              </button>
            </div>
            <button id="btn-toggle-screen" class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-white/5 text-white/70 active:scale-90 transition-transform">
              ${state.screen === 'home' ? icons.messageSquare : icons.moreHorizontal}
            </button>
          </div>
        </div>
      `;
    }

    function renderHome() {
      return `
        <div class="flex flex-1 flex-col animate-fade-in">
          <div class="flex flex-1 flex-col items-center justify-center px-6">
            <div class="relative flex h-64 w-64 items-center justify-center animate-float">
              <div class="voice-ring absolute h-full w-full animate-spin-slow"></div>
              <div class="voice-ring absolute h-[85%] w-[85%] animate-spin-reverse border-cyan-500/20"></div>
              ${state.isListening ? `
                <div class="absolute h-48 w-48 rounded-full bg-indigo-500/30 animate-ping" style="animation-duration:2s"></div>
                <div class="absolute h-48 w-48 rounded-full bg-purple-500/20 animate-ping" style="animation-duration:2.5s;animation-delay:0.5s"></div>
              ` : ''}
              <div class="relative flex h-36 w-36 items-center justify-center rounded-full bg-gradient-to-br from-indigo-600 via-purple-600 to-cyan-600 animate-pulse-glow" style="box-shadow:${state.isListening ? '0 0 60px rgba(99,102,241,0.6), inset 0 0 40px rgba(255,255,255,0.2)' : '0 0 40px rgba(99,102,241,0.3), inset 0 0 30px rgba(255,255,255,0.15)'};">
                <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-white/20 to-transparent"></div>
                <div class="flex items-end gap-1 h-8">
                  ${[0,1,2,3,4].map(i => `<div class="w-1.5 rounded-full bg-white/90 ${state.isListening ? 'animate-voice-bar' : ''}" style="${state.isListening ? `animation-delay:${i*0.1}s` : ''};height:${state.isListening ? '20%' : '30%'}"></div>`).join('')}
                </div>
              </div>
            </div>
            <div class="mt-8 text-center animate-slide-up" style="animation-delay:0.1s">
              <p class="text-lg font-light text-white/90">${state.isListening ? 'Слушаю...' : 'Чем могу помочь, сэр?'}</p>
              <p class="mt-2 text-sm text-white/40">Нажмите и удерживайте кнопку микрофона</p>
            </div>
          </div>

          ${!isApiConfigured() ? `
            <div class="mx-5 mb-3 flex items-start gap-3 rounded-2xl border border-amber-500/30 bg-amber-500/10 p-4 animate-slide-up" style="animation-delay:0.2s">
              ${icons.alertTriangle}
              <div>
                <p class="text-sm font-medium text-amber-200">API-ключ не настроен</p>
                <p class="mt-1 text-xs leading-relaxed text-amber-200/70">
                  Откройте этот HTML-файл в редакторе и вставьте ключ OpenRouter в поле <code class="rounded bg-amber-500/20 px-1 py-0.5">OPENROUTER_API_KEY</code>.
                </p>
              </div>
            </div>
          ` : ''}

          <div class="px-5 pb-4 animate-slide-up" style="animation-delay:0.3s">
            <p class="mb-3 text-xs font-medium uppercase tracking-wider text-white/40">Быстрые действия</p>
            <div class="grid grid-cols-4 gap-3">
              ${quickActions.map((action, i) => `
                <button class="quick-action group flex flex-col items-center gap-2 active:scale-92 transition-transform" data-index="${i}" style="animation-delay:${0.4 + i*0.08}s">
                  <div class="flex h-14 w-14 items-center justify-center rounded-2xl bg-gradient-to-br ${action.color} shadow-lg active:scale-95 transition-transform" style="box-shadow:0 8px 24px rgba(0,0,0,0.3)">
                    ${icons[action.icon]}
                  </div>
                  <span class="text-[11px] text-white/70">${action.label}</span>
                </button>
              `).join('')}
            </div>
          </div>

          <div class="px-5 pb-6 animate-slide-up" style="animation-delay:0.5s">
            <p class="mb-3 text-xs font-medium uppercase tracking-wider text-white/40">Идеи запросов</p>
            <div class="flex flex-col gap-2">
              ${suggestions.map((suggestion, i) => `
                <button class="suggestion glass flex items-center gap-3 rounded-2xl px-4 py-3 text-left transition-colors hover:bg-white/5 active:scale-98" data-text="${escapeHtml(suggestion)}" style="animation-delay:${0.6 + i*0.08}s">
                  ${icons.command}
                  <span class="text-sm text-white/80">${escapeHtml(suggestion)}</span>
                </button>
              `).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderChat() {
      return `
        <div class="custom-scrollbar flex flex-1 flex-col gap-4 overflow-y-auto px-5 py-4 animate-slide-in-right">
          ${state.messages.map(msg => `
            <div class="flex w-full ${msg.isUser ? 'justify-end' : 'justify-start'} animate-slide-up">
              <div class="max-w-[85%] rounded-3xl px-5 py-3.5 text-[15px] leading-relaxed ${msg.isUser ? 'glass-strong rounded-br-lg bg-gradient-to-br from-indigo-600/40 to-purple-600/40 text-white' : 'glass text-slate-200'}">
                ${formatMessage(msg.text)}
                <div class="mt-1 text-[10px] opacity-50 ${msg.isUser ? 'text-right' : 'text-left'}">${msg.time}</div>
              </div>
            </div>
          `).join('')}
          ${state.isTyping ? `
            <div class="glass w-fit rounded-3xl rounded-bl-lg px-5 py-4 animate-slide-up">
              <div class="flex gap-1.5">
                ${[0,1,2].map(i => `<div class="h-2 w-2 rounded-full bg-indigo-400 animate-bounce" style="animation-delay:${i*0.15}s"></div>`).join('')}
              </div>
            </div>
          ` : ''}
        </div>
      `;
    }

    // ───────────────────────────────────────────────────────────
    // УТИЛИТЫ
    // ───────────────────────────────────────────────────────────
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function formatMessage(text) {
      return escapeHtml(text).replace(/\n/g, '<br>');
    }

    function scrollToBottom() {
      const chat = document.querySelector('.custom-scrollbar');
      if (chat) chat.scrollTop = chat.scrollHeight;
    }

    // ───────────────────────────────────────────────────────────
    // ОБРАБОТКА СОБЫТИЙ
    // ───────────────────────────────────────────────────────────
    function bindEvents() {
      const input = document.getElementById('chat-input');
      const sendBtn = document.getElementById('btn-send');
      const micBtn = document.getElementById('btn-mic');
      const backBtn = document.getElementById('btn-back');
      const toggleBtn = document.getElementById('btn-toggle-screen');

      if (input) {
        input.addEventListener('input', (e) => {
          state.inputValue = e.target.value;
          render();
        });
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') handleSend();
        });
      }

      if (sendBtn) sendBtn.addEventListener('click', handleSend);

      if (micBtn) {
        micBtn.addEventListener('click', () => {
          state.isListening = !state.isListening;
          render();
        });
      }

      if (backBtn) backBtn.addEventListener('click', () => {
        state.screen = 'home';
        render();
      });

      if (toggleBtn) toggleBtn.addEventListener('click', () => {
        state.screen = state.screen === 'home' ? 'chat' : 'home';
        render();
      });

      document.querySelectorAll('.quick-action').forEach(btn => {
        btn.addEventListener('click', () => {
          state.screen = 'chat';
          render();
        });
      });

      document.querySelectorAll('.suggestion').forEach(btn => {
        btn.addEventListener('click', () => {
          handleSend(btn.dataset.text);
        });
      });
    }

    async function handleSend(text) {
      const messageText = text || state.inputValue;
      if (!messageText || !messageText.trim()) return;

      state.inputValue = '';
      state.screen = 'chat';
      state.messages.push({
        id: Date.now().toString(),
        text: messageText,
        isUser: true,
        time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      });
      state.isTyping = true;
      render();

      if (!isApiConfigured()) {
        setTimeout(() => {
          state.isTyping = false;
          state.messages.push({
            id: (Date.now() + 1).toString(),
            text: 'Для работы с реальным ИИ необходимо указать API-ключ OpenRouter в начале этого HTML-файла (поле OPENROUTER_API_KEY).',
            isUser: false,
            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          });
          render();
        }, 1000);
        return;
      }

      try {
        const aiText = await sendToOpenRouter(messageText);
        state.isTyping = false;
        state.messages.push({
          id: (Date.now() + 1).toString(),
          text: aiText,
          isUser: false,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
      } catch (err) {
        state.isTyping = false;
        state.messages.push({
          id: (Date.now() + 1).toString(),
          text: '⚠️ Ошибка подключения к ИИ: ' + (err.message || 'Неизвестная ошибка'),
          isUser: false,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        });
      }
      render();
    }

    // ───────────────────────────────────────────────────────────
    // ЗАПУСК
    // ───────────────────────────────────────────────────────────
    render();

    // Автопереход с welcome экрана
    setTimeout(() => {
      if (state.screen === 'welcome') {
        state.screen = 'home';
        render();
      }
    }, 3200);
  </script>
</body>
</html>
