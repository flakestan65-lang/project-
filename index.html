<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BlockBlast</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 10px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .score-panel {
            display: flex;
            gap: 20px;
        }

        .score-box {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 10px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .score-label {
            font-size: 12px;
            color: #a0a0c0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .score-value {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .new-game-btn {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            color: #fff;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .new-game-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        .new-game-btn:active {
            transform: translateY(0);
        }

        .board-container {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 3px;
            width: min(360px, 85vw);
            height: min(360px, 85vw);
        }

        .cell {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 6px;
            transition: all 0.2s ease;
            position: relative;
        }

        .cell.filled {
            box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.2), 0 2px 4px rgba(0, 0, 0, 0.3);
        }

        .cell.preview {
            opacity: 0.5;
            transform: scale(0.9);
        }

        .cell.clearing {
            animation: clearPulse 0.5s ease forwards;
        }

        @keyframes clearPulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .pieces-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            min-height: 100px;
            align-items: center;
        }

        .piece-slot {
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            border: 2px dashed rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
        }

        .piece-slot.active {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .piece {
            display: grid;
            gap: 2px;
            cursor: grab;
            transition: transform 0.1s ease;
            touch-action: none;
        }

        .piece:active {
            cursor: grabbing;
        }

        .piece.dragging {
            position: fixed;
            z-index: 1000;
            pointer-events: none;
            transform: scale(1.1);
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.5));
        }

        .piece-cell {
            width: 22px;
            height: 22px;
            border-radius: 4px;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.3), 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .piece.used {
            opacity: 0;
            transform: scale(0);
            pointer-events: none;
        }

        .game-over-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
            animation: titleBounce 1s ease infinite alternate;
        }

        @keyframes titleBounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .game-over-score {
            font-size: 24px;
            margin-bottom: 30px;
            color: #a0a0c0;
        }

        .game-over-score span {
            color: #fff;
            font-weight: bold;
        }

        .combo-text {
            position: fixed;
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            pointer-events: none;
            z-index: 1500;
            animation: comboFloat 1s ease forwards;
        }

        @keyframes comboFloat {
            0% { transform: translateY(0) scale(0.5); opacity: 0; }
            20% { transform: translateY(-20px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-80px) scale(1); opacity: 0; }
        }

        .particles {
            position: fixed;
            pointer-events: none;
            z-index: 1500;
        }

        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: particleBurst 0.8s ease forwards;
        }

        @keyframes particleBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        /* Цвета фигур */
        .color-0 { background: linear-gradient(135deg, #e94560, #ff6b6b); }
        .color-1 { background: linear-gradient(135deg, #0f3460, #533483); }
        .color-2 { background: linear-gradient(135deg, #16c79a, #06d6a0); }
        .color-3 { background: linear-gradient(135deg, #f9a826, #ffd93d); }
        .color-4 { background: linear-gradient(135deg, #118ab2, #06b6d4); }
        .color-5 { background: linear-gradient(135deg, #ef476f, #ff8fa3); }
        .color-6 { background: linear-gradient(135deg, #9b5de5, #c77dff); }
        .color-7 { background: linear-gradient(135deg, #00bbf9, #48cae4); }

        @media (max-width: 400px) {
            .board {
                width: 300px;
                height: 300px;
            }
            .piece-cell {
                width: 18px;
                height: 18px;
            }
            .piece-slot {
                width: 75px;
                height: 75px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <div class="score-panel">
                <div class="score-box">
                    <div class="score-label">Счёт</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">Рекорд</div>
                    <div class="score-value" id="highscore">0</div>
                </div>
            </div>
            <button class="new-game-btn" id="newGameBtn">Новая игра</button>
        </div>

        <div class="board-container">
            <div class="board" id="board"></div>
        </div>

        <div class="pieces-container" id="piecesContainer">
            <div class="piece-slot" id="slot0"></div>
            <div class="piece-slot" id="slot1"></div>
            <div class="piece-slot" id="slot2"></div>
        </div>
    </div>

    <div class="game-over-overlay" id="gameOverOverlay">
        <div class="game-over-title">Игра окончена!</div>
        <div class="game-over-score">Счёт: <span id="finalScore">0</span></div>
        <button class="new-game-btn" id="restartBtn">Играть снова</button>
    </div>

    <script>
        // ==================== АУДИО ====================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            switch(type) {
                case 'place':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now);
                    osc.stop(now + 0.15);
                    break;
                case 'clear':
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.2);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                    break;
                case 'combo':
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.setValueAtTime(500, now + 0.1);
                    osc.frequency.setValueAtTime(700, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                    break;
                case 'gameover':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.5);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                    break;
            }
        }

        // ==================== ИГРОВЫЕ ДАННЫЕ ====================
        const BOARD_SIZE = 8;
        const PIECES_COUNT = 3;
        
        // Определения фигур (тетрамино и другие блоки)
        const PIECE_DEFINITIONS = [
            // I (линия из 4)
            { shape: [[1,1,1,1]], color: 0 },
            // O (квадрат 2x2)
            { shape: [[1,1],[1,1]], color: 1 },
            // T
            { shape: [[0,1,0],[1,1,1]], color: 2 },
            // L
            { shape: [[1,0,0],[1,1,1]], color: 3 },
            // J
            { shape: [[0,0,1],[1,1,1]], color: 4 },
            // S
            { shape: [[0,1,1],[1,1,0]], color: 5 },
            // Z
            { shape: [[1,1,0],[0,1,1]], color: 6 },
            // I вертикальный (линия из 3)
            { shape: [[1],[1],[1]], color: 7 },
            // L маленький
            { shape: [[1,0],[1,1]], color: 0 },
            // Прямоугольник 1x3
            { shape: [[1,1,1]], color: 1 },
            // Прямоугольник 1x2
            { shape: [[1,1]], color: 2 },
            // Одиночный блок
            { shape: [[1]], color: 3 },
            // L большой
            { shape: [[1,0,0],[1,0,0],[1,1,1]], color: 4 },
            // T большой
            { shape: [[1,1,1],[0,1,0],[0,1,0]], color: 5 },
            // Крест
            { shape: [[0,1,0],[1,1,1],[0,1,0]], color: 6 },
            // Zigzag 3
            { shape: [[1,1,0],[0,1,1]], color: 7 },
            // Прямоугольник 2x3
            { shape: [[1,1,1],[1,1,1]], color: 0 },
            // Прямоугольник 1x5
            { shape: [[1,1,1,1,1]], color: 1 },
        ];

        let board = [];
        let score = 0;
        let highScore = 0;
        let pieces = [];
        let draggedPiece = null;
        let dragOffset = { x: 0, y: 0 };
        let dragElement = null;
        let dragSlotIndex = -1;
        let isGameOver = false;

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        function init() {
            loadHighScore();
            createBoard();
            generatePieces();
            updateScoreDisplay();
            setupEventListeners();
        }

        function loadHighScore() {
            const saved = localStorage.getItem('blockblast_highscore');
            if (saved) {
                highScore = parseInt(saved);
                document.getElementById('highscore').textContent = highScore;
            }
        }

        function saveHighScore() {
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('blockblast_highscore', highScore);
                document.getElementById('highscore').textContent = highScore;
            }
        }

        function createBoard() {
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            const boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            
            for (let r = 0; r < BOARD_SIZE; r++) {
                for (let c = 0; c < BOARD_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardEl.appendChild(cell);
                }
            }
        }

        function generatePieces() {
            pieces = [];
            for (let i = 0; i < PIECES_COUNT; i++) {
                const def = PIECE_DEFINITIONS[Math.floor(Math.random() * PIECE_DEFINITIONS.length)];
                pieces.push({
                    shape: def.shape.map(row => [...row]),
                    color: def.color,
                    used: false
                });
            }
            renderPieces();
        }

        function renderPieces() {
            for (let i = 0; i < PIECES_COUNT; i++) {
                const slot = document.getElementById('slot' + i);
                slot.innerHTML = '';
                
                if (!pieces[i] || pieces[i].used) {
                    slot.classList.remove('active');
                    continue;
                }
                
                slot.classList.add('active');
                const pieceEl = createPieceElement(pieces[i], i);
                slot.appendChild(pieceEl);
            }
        }

        function createPieceElement(piece, index) {
            const rows = piece.shape.length;
            const cols = piece.shape[0].length;
            
            const el = document.createElement('div');
            el.className = 'piece';
            el.dataset.pieceIndex = index;
            el.style.gridTemplateColumns = `repeat(${cols}, 22px)`;
            el.style.gridTemplateRows = `repeat(${rows}, 22px)`;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'piece-cell';
                    if (piece.shape[r][c]) {
                        cell.classList.add('color-' + piece.color);
                    } else {
                        cell.style.visibility = 'hidden';
                    }
                    el.appendChild(cell);
                }
            }
            
            return el;
        }

        // ==================== РЕНДЕРИНГ ДОСКИ ====================
        function renderBoard() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                cell.className = 'cell';
                if (board[r][c] !== null) {
                    cell.classList.add('filled', 'color-' + board[r][c]);
                }
            });
        }

        function showPreview(piece, startRow, startCol) {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                const r = parseInt(cell.dataset.row);
                const c = parseInt(cell.dataset.col);
                
                if (board[r][c] === null) {
                    cell.classList.remove('preview');
                }
            });
            
            if (!piece || startRow < 0 || startCol < 0) return;
            
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const boardR = startRow + r;
                        const boardC = startCol + c;
                        if (boardR >= 0 && boardR < BOARD_SIZE && boardC >= 0 && boardC < BOARD_SIZE) {
                            const cell = document.querySelector(`.cell[data-row="${boardR}"][data-col="${boardC}"]`);
                            if (cell && board[boardR][boardC] === null) {
                                cell.classList.add('preview', 'color-' + piece.color);
                            }
                        }
                    }
                }
            }
        }

        function clearPreview() {
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                if (!cell.classList.contains('filled')) {
                    cell.className = 'cell';
                }
            });
        }

        // ==================== ЛОГИКА ИГРЫ ====================
        function canPlacePiece(piece, startRow, startCol) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        const boardR = startRow + r;
                        const boardC = startCol + c;
                        if (boardR < 0 || boardR >= BOARD_SIZE || boardC < 0 || boardC >= BOARD_SIZE) {
                            return false;
                        }
                        if (board[boardR][boardC] !== null) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function placePiece(piece, startRow, startCol) {
            for (let r = 0; r < piece.shape.length; r++) {
                for (let c = 0; c < piece.shape[r].length; c++) {
                    if (piece.shape[r][c]) {
                        board[startRow + r][startCol + c] = piece.color;
                    }
                }
            }
        }

        function checkLines() {
            const linesToClear = [];
            
            // Проверяем горизонтали
            for (let r = 0; r < BOARD_SIZE; r++) {
                let full = true;
                for (let c = 0; c < BOARD_SIZE; c++) {
                    if (board[r][c] === null) {
                        full = false;
                        break;
                    }
                }
                if (full) linesToClear.push({ type: 'row', index: r });
            }
            
            // Проверяем вертикали
            for (let c = 0; c < BOARD_SIZE; c++) {
                let full = true;
                for (let r = 0; r < BOARD_SIZE; r++) {
                    if (board[r][c] === null) {
                        full = false;
                        break;
                    }
                }
                if (full) linesToClear.push({ type: 'col', index: c });
            }
            
            return linesToClear;
        }

        function clearLines(lines) {
            const clearedCells = new Set();
            
            lines.forEach(line => {
                if (line.type === 'row') {
                    for (let c = 0; c < BOARD_SIZE; c++) {
                        clearedCells.add(`${line.index},${c}`);
                    }
                } else {
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        clearedCells.add(`${r},${line.index}`);
                    }
                }
            });
            
            // Анимация исчезновения
            clearedCells.forEach(key => {
                const [r, c] = key.split(',').map(Number);
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                if (cell) cell.classList.add('clearing');
            });
            
            // Создаём частицы
            clearedCells.forEach(key => {
                const [r, c] = key.split(',').map(Number);
                const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
                if (cell) createParticles(cell);
            });
            
            setTimeout(() => {
                lines.forEach(line => {
                    if (line.type === 'row') {
                        for (let c = 0; c < BOARD_SIZE; c++) {
                            board[line.index][c] = null;
                        }
                    } else {
                        for (let r = 0; r < BOARD_SIZE; r++) {
                            board[r][line.index] = null;
                        }
                    }
                });
                renderBoard();
            }, 500);
            
            return clearedCells.size;
        }

        function createParticles(cell) {
            const rect = cell.getBoundingClientRect();
            const container = document.createElement('div');
            container.className = 'particles';
            container.style.left = rect.left + rect.width / 2 + 'px';
            container.style.top = rect.top + rect.height / 2 + 'px';
            document.body.appendChild(container);
            
            const colors = ['#e94560', '#16c79a', '#f9a826', '#118ab2', '#ef476f', '#9b5de5', '#00bbf9'];
            
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.background = colors[Math.floor(Math.random() * colors.length)];
                const angle = (Math.PI * 2 * i) / 8;
                const dist = 30 + Math.random() * 30;
                p.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--ty', Math.sin(angle) * dist + 'px');
                container.appendChild(p);
            }
            
            setTimeout(() => container.remove(), 1000);
        }

        function showComboText(text, x, y) {
            const el = document.createElement('div');
            el.className = 'combo-text';
            el.textContent = text;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function calculateScore(linesCount, cellsCleared) {
            const baseScore = cellsCleared * 10;
            const comboMultiplier = linesCount > 1 ? linesCount * 0.5 + 0.5 : 1;
            return Math.floor(baseScore * comboMultiplier);
        }

        function updateScoreDisplay() {
            document.getElementById('score').textContent = score;
        }

        function checkGameOver() {
            for (let i = 0; i < PIECES_COUNT; i++) {
                if (pieces[i] && !pieces[i].used) {
                    for (let r = 0; r < BOARD_SIZE; r++) {
                        for (let c = 0; c < BOARD_SIZE; c++) {
                            if (canPlacePiece(pieces[i], r, c)) {
                                return false;
                            }
                        }
                    }
                }
            }
            return true;
        }

        function gameOver() {
            isGameOver = true;
            saveHighScore();
            playSound('gameover');
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }

        function newGame() {
            isGameOver = false;
            score = 0;
            board = Array(BOARD_SIZE).fill(null).map(() => Array(BOARD_SIZE).fill(null));
            document.getElementById('gameOverOverlay').classList.remove('show');
            createBoard();
            generatePieces();
            updateScoreDisplay();
        }

        // ==================== DRAG AND DROP ====================
        function getBoardPosition(clientX, clientY) {
            const boardEl = document.getElementById('board');
            const rect = boardEl.getBoundingClientRect();
            const cellSize = rect.width / BOARD_SIZE;
            
            const col = Math.floor((clientX - rect.left) / cellSize);
            const row = Math.floor((clientY - rect.top) / cellSize);
            
            return { row, col };
        }

        function startDrag(e, pieceIndex) {
            if (isGameOver || pieces[pieceIndex].used) return;
            
            initAudio();
            
            const piece = pieces[pieceIndex];
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            
            draggedPiece = piece;
            dragSlotIndex = pieceIndex;
            
            // Создаём копию для перетаскивания
            dragElement = createPieceElement(piece, pieceIndex);
            dragElement.classList.add('dragging');
            document.body.appendChild(dragElement);
            
            const rect = dragElement.getBoundingClientRect();
            dragOffset.x = rect.width / 2;
            dragOffset.y = rect.height / 2;
            
            dragElement.style.left = (clientX - dragOffset.x) + 'px';
            dragElement.style.top = (clientY - dragOffset.y) + 'px';
            
            // Скрываем оригинал
            const slot = document.getElementById('slot' + pieceIndex);
            slot.innerHTML = '';
            slot.classList.remove('active');
        }

        function moveDrag(e) {
            if (!draggedPiece || !dragElement) return;
            
            e.preventDefault();
            const clientX = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            
            dragElement.style.left = (clientX - dragOffset.x) + 'px';
            dragElement.style.top = (clientY - dragOffset.y) + 'px';
            
            // Показываем превью
            const pos = getBoardPosition(clientX, clientY);
            const pieceHeight = draggedPiece.shape.length;
            const pieceWidth = draggedPiece.shape[0].length;
            const startRow = pos.row - Math.floor(pieceHeight / 2);
            const startCol = pos.col - Math.floor(pieceWidth / 2);
            
            if (canPlacePiece(draggedPiece, startRow, startCol)) {
                showPreview(draggedPiece, startRow, startCol);
            } else {
                clearPreview();
            }
        }

        function endDrag(e) {
            if (!draggedPiece || !dragElement) return;
            
            const clientX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
            const clientY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : 0);
            
            const pos = getBoardPosition(clientX, clientY);
            const pieceHeight = draggedPiece.shape.length;
            const pieceWidth = draggedPiece.shape[0].length;
            const startRow = pos.row - Math.floor(pieceHeight / 2);
            const startCol = pos.col - Math.floor(pieceWidth / 2);
            
            let placed = false;
            
            if (canPlacePiece(draggedPiece, startRow, startCol)) {
                placePiece(draggedPiece, startRow, startCol);
                pieces[dragSlotIndex].used = true;
                placed = true;
                
                playSound('place');
                renderBoard();
                
                // Проверяем линии
                setTimeout(() => {
                    const lines = checkLines();
                    if (lines.length > 0) {
                        const cellsCleared = clearLines(lines);
                        const points = calculateScore(lines.length, cellsCleared);
                        score += points;
                        updateScoreDisplay();
                        
                        if (lines.length > 1) {
                            playSound('combo');
                            showComboText(`COMBO x${lines.length}! +${points}`, clientX, clientY);
                        } else {
                            playSound('clear');
                        }
                        
                        saveHighScore();
                    }
                    
                    // Проверяем, все ли фигуры использованы
                    const allUsed = pieces.every(p => p.used);
                    if (allUsed) {
                        setTimeout(() => {
                            generatePieces();
                            if (checkGameOver()) {
                                gameOver();
                            }
                        }, lines.length > 0 ? 600 : 0);
                    } else if (checkGameOver()) {
                        setTimeout(gameOver, lines.length > 0 ? 600 : 0);
                    }
                }, 50);
            }
            
            dragElement.remove();
            dragElement = null;
            draggedPiece = null;
            dragSlotIndex = -1;
            clearPreview();
            
            if (!placed) {
                renderPieces();
            }
        }

        function setupEventListeners() {
            // Мышь
            document.addEventListener('mousedown', (e) => {
                const pieceEl = e.target.closest('.piece');
                if (pieceEl) {
                    const index = parseInt(pieceEl.dataset.pieceIndex);
                    startDrag(e, index);
                }
            });
            
            document.addEventListener('mousemove', moveDrag);
            document.addEventListener('mouseup', endDrag);
            
            // Тач
            document.addEventListener('touchstart', (e) => {
                const pieceEl = e.target.closest('.piece');
                if (pieceEl) {
                    const index = parseInt(pieceEl.dataset.pieceIndex);
                    startDrag(e, index);
                }
            }, { passive: false });
            
            document.addEventListener('touchmove', moveDrag, { passive: false });
            document.addEventListener('touchend', endDrag);
            
            // Кнопки
            document.getElementById('newGameBtn').addEventListener('click', () => {
                initAudio();
                newGame();
            });
            
            document.getElementById('restartBtn').addEventListener('click', () => {
                initAudio();
                newGame();
            });
        }

        // ==================== СТАРТ ====================
        init();
    </script>
</body>
</html>
